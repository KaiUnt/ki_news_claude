server {
    server_name kinews.kais.world;

    root /home/kai/kinewsclaude/frontend/dist;
    index index.html;

    auth_basic           "KI-News";
    auth_basic_user_file /etc/nginx/.htpasswd-kinews;

    # Let's Encrypt cert renewals must stay public
    location ^~ /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/html;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:8004;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen [::]:443 ssl; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kinews.kais.world/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kinews.kais.world/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}
server {
    if ($host = kinews.kais.world) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name kinews.kais.world;
    return 404; # managed by Certbot


}
