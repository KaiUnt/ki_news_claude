name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh "${SSH_USER}@${SSH_HOST}" 'bash -s' <<'REMOTE'
          set -euxo pipefail
          cd ~/kinewsclaude

          # Pull latest
          git fetch origin main
          git reset --hard origin/main

          # Backend deps (idempotent)
          .venv/bin/pip install -r requirements.txt

          # Frontend build
          cd frontend
          npm ci
          npm run build
          cd ..

          # Restart backend
          sudo /bin/systemctl restart kinews-backend.service

          # Smoke test (wait up to ~15s for backend to come up)
          sleep 3
          curl -fsS --retry 5 --retry-delay 2 --retry-all-errors http://127.0.0.1:8004/api/stats > /dev/null && echo "Backend OK"
          REMOTE
